name: "Deploy"

on:
  push:
    branches:
      - main

jobs:
  deploy_backend:
    name: "Deploy the new backend"

    runs-on: ubuntu-latest
    steps:
        - name: Deploy via SSH
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: walrus.codes
            username: admin
            key: ${{ secrets.SSH_KEY }}
            port: ${{ 22 }}
            script: |
              cd /home/admin/projects/schach
              bash .github/.scripts/deploy.sh
