name: Deploy the latest images

on:
  push:
    branches:
      - main

jobs:
  push_images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          target: backend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: nginxprod
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:prod

      - name: Build and push go tui
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          target: tui
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tui:latest
          build-args: |
            BACKEND_URL: ${{ secrets.BACKEND_URL }}

  pull_and_RUN:
    runs-on: ubuntu-latest
    needs: push_images


    env:
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      TF_VAR_namecom_username: ${{ secrets.TF_VAR_namecom_username }}
      TF_VAR_namecom_api_token: ${{ secrets.TF_VAR_namecom_api_token }}
      TF_VAR_private_key_ssh: ${{ secrets.SSH_KEY }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: terraform changes
        run: |
          cd ./infra/terraform
          terraform init
          terraform apply --auto-approve

      - name: set terraform outputs
        id: terraform
        run: |
          cd ./infra/terraform
          echo "ssh_host=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      # - name: Let terraform finish
      #   run: |
      #     sleep 1m
      #

      - name: ssh
        uses: appleboy/ssh-action@master
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        with:
          host: ${{ steps.terraform.outputs.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_path: .github/.scripts/docker.sh
