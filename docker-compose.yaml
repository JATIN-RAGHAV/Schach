services:
  # service 1
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: backend
    image: backend:latest
    ports:
      - 2222:2222
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:password@localhost:5432/chess

  # service 2
  nginxdev:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginxdev
    container_name: nginxdev
    image: nginx:dev
    ports:
      - 1234:80
    depends_on:
      - backend

  # service 3
  tui:
    build:
      context: .
      dockerfile: Dockerfile
      target: tui
    container_name: tui
    image: tui:latest
    depends_on:
      - backend
    ports:
      - 2345:22

  # service 4
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
      target: postgres
    container_name: postgres
    image: postgres:local
    ports:
      - 5432:5432
    command: -c listen_addresses='*'
    environment:
      POSTGRES_PASSWORD: password
