events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # Backend
    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name backend-schach.walrus.codes;

        ssl_certificate /etc/ssl/certs/backend-schach.walrus.codes.crt;
        ssl_certificate_key /etc/ssl/certs/backend-schach.walrus.codes.key;

        # Supported TLS protocols (TLSv1.2 and 1.3 are recommended)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Forward requests to the backend server
            proxy_pass http://backend:2222;

            # Forward original client headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Frontend
    server {

        listen 443 ssl;
        listen [::]:443 ssl;

        server_name schach.walrus.codes;

        ssl_certificate /etc/ssl/certs/schach.walrus.codes.crt;
        ssl_certificate_key /etc/ssl/certs/schach.walrus.codes.key;

        # Supported TLS protocols (TLSv1.2 and 1.3 are recommended)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        location / {
            root  /var/www/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }

    # Default
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;

        server_name _;

        ssl_certificate /etc/ssl/certs/walrus.codes.crt;
        ssl_certificate_key /etc/ssl/certs/walrus.codes.key;

        # Supported TLS protocols (TLSv1.2 and 1.3 are recommended)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            root  /var/www/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

    }

    # Default
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        server_name _;

        return 301 https://$host$request_uri;
    }
}
